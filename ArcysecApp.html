        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --midnight: #0a0c10;
            --charcoal: #050505;
            --cyber-lime: #32ff7e;
            --primary-blue: #93c5fd;
            --cyber-dark-blue: #007196;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--charcoal);
            color: #e2e8f0;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cyber-gradient-text {
            background: linear-gradient(135deg, #fff 0%, var(--primary-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background-color: var(--primary-blue);
            color: #000;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary:hover {
            background-color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(147, 197, 253, 0.3);
        }

        .btn-demo-header {
            background-color: var(--cyber-dark-blue);
            color: #fff;
            transition: all 0.2s ease;
            font-weight: 700;
            border-radius: 4px;
        }

        @keyframes pulse-lime {
            0% { box-shadow: 0 0 0 0 rgba(50, 255, 126, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(50, 255, 126, 0); }
            100% { box-shadow: 0 0 0 0 rgba(50, 255, 126, 0); }
        }

        .status-active {
            animation: pulse-lime 2s infinite;
        }

        .grid-pattern {
            background-image: radial-gradient(rgba(147, 197, 253, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .page-transition {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        @keyframes marqueeRight {
        0% { transform: translateX(-50%); }
        100% { transform: translateX(0%); }
    }

        @keyframes marqueeLeft {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }

        .animate-marquee-right {
            animation: marqueeRight 40s linear infinite;
        }

        .animate-marquee-left {
            animation: marqueeLeft 40s linear infinite;
        }

        /* Berhenti saat di-hover */
        .animate-marquee-right:hover, .animate-marquee-left:hover {
            animation-play-state: paused;
        }

</head>

                                    <div className="glass rounded-[2rem] overflow-hidden shadow-2xl relative aspect-video border border-white/5 bg-[#0a0c12]">
                                        <video src={VIDEO_URL} autoPlay muted loop className="w-full h-full object-cover" />
                                        <div className="absolute top-8 left-8 flex items-center space-x-4 bg-black/60 backdrop-blur-md px-6 py-3 rounded-full border border-white/10">
                                            <i data-lucide="activity" className="text-blue-400 w-5 h-5"></i>
                                            <span className="text-[10px] font-mono text-slate-300 tracking-[0.3em] uppercase text-center">Eternity Defense Active</span>
                                        </div>
                                    </div>
                                    <p className="mt-12 text-slate-400 text-sm font-light">By the time hackers breach the perimeter, they find nothing but an <strong>"empty room."</strong> Your data is secured elsewhere before they can even touch it.</p>
                                </div>
                            </section>

                            <section id="vault" className="py-32 max-w-7xl mx-auto px-8 text-center">
                                <h2 className="text-4xl font-bold mb-6 tracking-tight cyber-gradient-text uppercase">Why Trust Your Security to Us?</h2>
                                <p className="text-slate-500 max-w-2xl mx-auto mb-20 italic font-light">Our primary goal is to provide absolute peace of mind for every client. We believe that digital assets are the lifeblood of your company.</p>
                                <div className="grid md:grid-cols-3 gap-8 text-left mt-20">
                                    {[
                                        { title: "Multi-Layered Storage", text: "Your data is moved to a secure zone with high-level encryption accessible only by verified credentials.", icon: "layers" },
                                        { title: "Strict Access Control", text: "Without the correct password and identity verification, data remains inaccessible, ensuring total confidentiality.", icon: "lock" },
                                        { title: "Data Integrity", text: "Our system is designed to secure and move sensitive information without ever altering its original state.", icon: "shield-check" }
                                    ].map((item, i) => (
                                        <div key={i} className="glass p-12 rounded-[3rem] hover:bg-blue-500/5 transition-all text-left">
                                            <i data-lucide={item.icon} className="w-12 h-12 text-blue-400 mb-8"></i>
                                            <h4 className="text-xl font-bold mb-4 text-white uppercase tracking-tight">{item.title}</h4>
                                            <p className="text-slate-500 text-sm leading-relaxed">{item.text}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>
                
                            <section id="archy" className="py-32 bg-midnight/50 border-y border-white/5 text-left px-8">
                                <div className="max-w-7xl mx-auto">
                                    <h2 className="text-5xl font-bold mb-4 uppercase tracking-tighter text-white text-left">Archy: <span className="text-blue-400">The Background AI Engine</span></h2>
                                    <p className="text-slate-400 text-lg font-light mb-16 italic text-left">Archy is not just software; it is an intelligent entity guarding your infrastructure 24/7.</p>
                                    <div className="grid md:grid-cols-3 gap-10">
                                        {[
                                            { title: "Real-Time Monitoring", text: "Archy analyzes network traffic continuously to detect even the slightest suspicious activity.", icon: "eye" },
                                            { title: "Rapid Migration Protocol", text: "Archy has specialized access to move data to backup storage with lightning speed without the ability to edit content.", icon: "zap" },
                                            { title: "Automatic Lockdown", text: "Archy immediately locks down the affected location or suspicious activity site to prevent lateral movement.", icon: "shield-alert" }
                                        ].map((tech, i) => (
                                            <div key={i} className="glass p-12 rounded-3xl relative group hover:bg-blue-500/5 transition-all text-left">
                                                <div className="absolute top-0 left-0 w-1 h-full bg-blue-500/30 group-hover:bg-blue-400 transition-colors text-left"></div>
                                                <i data-lucide={tech.icon} className="w-10 h-10 text-blue-400 mb-8 transition-transform group-hover:scale-110"></i>
                                                <h4 className="text-2xl font-bold mb-4 text-white uppercase tracking-tight">{tech.title}</h4>
                                                <p className="text-slate-400 text-sm font-light leading-relaxed">{tech.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            <section id="philosophy" className="py-40 relative text-left px-8">
                                <div className="max-w-5xl mx-auto grid lg:grid-cols-2 gap-24 items-center">
                                    <div className="space-y-12">
                                        <div>
                                            <h4 className="font-bold text-xl mb-3 text-blue-400 uppercase tracking-widest text-left text-left">The Symbol of Continuity (Eternity)</h4>
                                            <p className="text-slate-400 leading-relaxed font-light text-sm">Our identity, inspired by the "Eternity" concept, represents continuous and never-ending protection. We are committed to guarding your data legacy indefinitely.</p>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-xl mb-3 text-blue-400 uppercase tracking-widest text-left">Resilience through Synergy</h4>
                                            <p className="text-slate-400 leading-relaxed font-light text-sm">Just like the expert team behind this system—including roles in engineering and leadership—your security is a result of synergy between AI and forensic experts.</p>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-xl mb-3 text-blue-400 uppercase tracking-widest text-left">Enterprise-Grade Trust</h4>
                                            <p className="text-slate-400 leading-relaxed font-light text-sm text-left">We apply security standards designed for the most privileged environments, ensuring robust protection for every client.</p>
                                        </div>
                                    </div>
                                    <div className="glass p-16 rounded-[4rem] text-center border-white/5">
                                        <img src={LOGO_URL} alt="Logo Symbol" className="w-full grayscale opacity-80" />
                                        <p className="mt-12 text-[10px] font-black tracking-[0.5em] text-blue-300 uppercase text-center">Eternity Concept Active</p>
                                    </div>
                                </div>
                            </section>
                            <section className="py-24 border-t border-white/5 bg-black/40 text-left px-8">
                                <div className="max-w-7xl mx-auto px-8 text-left">
                                    <div className="flex flex-wrap justify-center gap-16 opacity-30 grayscale items-center mb-24 font-bold text-2xl text-left">
                                        <span>Google Cloud</span> <span>Microsoft</span> <span>AWS</span> <span>SAP</span>
                                    </div>
                                    <h3 className="text-3xl font-bold uppercase tracking-widest mb-12 text-left">Arcysec Unit Updates</h3>
                                    
                                    <div id="blog" className="grid lg:grid-cols-3 gap-12 text-left">
                                        {/* Post 1 */}
                                        <div className="group cursor-pointer">
                                            <div className="aspect-video glass rounded-3xl mb-8 overflow-hidden relative">
                                                {/* Foto Post 1 */}
                                                <img 
                                                    src="Assets/recognize.jpg"
                                                    alt="Assets/recognize.jpg" 
                                                    className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-110 transition-transform duration-700"
                                                />
                                                <div className="absolute inset-0 bg-gradient-to-tr from-blue-900/40 to-transparent"></div>
                                            </div>
                                            <h4 className="text-2xl font-bold text-white group-hover:text-blue-400 transition-colors leading-tight text-left">
                                                ARCYSEC Recognized as Emerging Leader in Identity Security Innovation
                                            </h4>
                                        </div>

                                        {/* Post 2 */}
                                        <div className="group cursor-pointer">
                                            <div className="aspect-video glass rounded-3xl mb-8 overflow-hidden relative">
                                                {/* Foto Post 2 */}
                                                <img 
                                                    src="Assets/credentials.jpg"
                                                    alt="Assets/credentials.jpg" 
                                                    className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-110 transition-transform duration-700"
                                                />
                                                <div className="absolute inset-0 bg-gradient-to-tr from-blue-900/40 to-transparent"></div>
                                            </div>
                                            <h4 className="text-2xl font-bold text-white group-hover:text-blue-400 transition-colors leading-tight text-left">
                                                Rising Credential Attacks Observed Across Cloud Infrastructure
                                            </h4>
                                        </div>

                                        {/* Post 3 */}
                                        <div className="group cursor-pointer">
                                            <div className="aspect-video glass rounded-3xl mb-8 overflow-hidden relative">
                                                {/* Foto Post 3 */}
                                                <img 
                                                    src="Assets/collaboration_Quantum.jpg" 
                                                    alt="Assets/collaboration_Quantum.jpg" 
                                                    className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-110 transition-transform duration-700"
                                                />
                                                <div className="absolute inset-0 bg-gradient-to-tr from-blue-900/40 to-transparent"></div>
                                            </div>
                                            <h4 className="text-2xl font-bold text-white group-hover:text-blue-400 transition-colors leading-tight text-left">
                                                ARCYSEC Announces Collaboration on Quantum Security Research
                                            </h4>
                                        </div>
                                    </div>
                                </div>
                            </section>
                             {searchQuery !== "" && !['home', 'platform', 'solutions', 'identity', 'marketplace', 'request'].some(p => p.includes(searchQuery.toLowerCase())) && (
                                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm page-transition">
                                    <div className="text-center glass p-20 rounded-[3rem] border-blue-500/20">
                                        <i data-lucide="search-x" className="w-20 h-20 text-slate-500 mx-auto mb-6"></i>
                                        <h2 className="text-3xl font-bold mb-2">Data not found</h2>
                                        <p className="text-slate-400 mb-8">Maaf, kami tidak menemukan hasil untuk "{searchQuery}"</p>
                                        <button 
                                            onClick={() => setSearchQuery("")} 
                                            className="btn-primary px-8 py-3 rounded-full text-xs font-bold uppercase tracking-widest"
                                        >
                                            Clear Search
                                        </button>
                                    </div>
                                </div>
                            )}
                            <section className="py-48 bg-blue-600/5 text-center px-8 relative overflow-hidden">
                                <div className="max-w-4xl mx-auto relative z-10 text-center">
                                    <h2 className="text-5xl lg:text-7xl font-bold mb-12 tracking-tighter uppercase cyber-gradient-text text-center text-center">Ready to Secure Your Digital Future?</h2>
                                    <a href={WHATSAPP_LINK} target="_blank" className="btn-primary px-16 py-6 rounded-full font-black text-lg uppercase tracking-widest shadow-2xl shadow-blue-500/20 text-center">Get a Free Consultation</a>
                                </div>
                            </section>
                        </div>
                    )}

                    {page === 'platform' && <PlatformPage setPage={setPage} />}
                    {page === 'request' && <RequestDemoPage setPage={setPage} />}
                    {page === 'partners' && <PartnersPage setPage={setPage} />}
                    {page === 'identity' && <IdentitySecurityPage setPage={setPage} />}
                    {page === 'resources' && <ResourcesPage setPage={setPage} />}
                    {page === 'solutions' && <SolutionsPage setPage={setPage} />}

                    <footer className={`py-24 border-t px-8 text-left ${isLightPage ? 'bg-slate-50 border-slate-200' : (page === 'marketplace' ? 'bg-[#0a1d2f]' : 'bg-black border-white/5')}`}>
                        <div className="max-w-7xl mx-auto text-center text-[10px] font-bold text-slate-700 tracking-[0.5em] uppercase text-center">
                            © 2026 Arcysec Ecosystem. Protected by Archy AI. All Rights Reserved.
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
